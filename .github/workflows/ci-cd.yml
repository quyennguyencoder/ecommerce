name: eCommerce CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest

  cd-pipeline:
    runs-on: ubuntu-latest
    needs: ci-pipeline
    # Dòng lệnh dưới đây khiến Job này không bao giờ chạy
#    if: false
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          password: ${{ secrets.AZURE_PASSWORD }}
          script: |
            cd /home/nguyenquyen/ecommerce-project
            # 1. Kéo image mới về
            docker compose pull app

            # 2. Dừng và xóa container cũ trước khi lên bản mới (giúp tránh lỗi Conflict Name)
            docker compose stop app
            docker compose rm -f app

            # 3. Khởi chạy bản mới với các flag đảm bảo an toàn
            docker compose up -d --force-recreate --remove-orphans app

            # 4. Dọn dẹp các image cũ không còn dùng đến để tiết kiệm dung lượng (VM 1GB RAM cần cái này)
            docker image prune -f