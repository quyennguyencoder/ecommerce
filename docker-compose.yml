# Docker Compose Configuration for eCommerce Application
#
# Câu lệnh để chạy từng container:
# ================================
#
# 1. Chạy tất cả các container:
#    docker-compose up -d
#
# 2. Chạy riêng MySQL:
#    docker-compose up -d mysql
#
# 3. Chạy riêng Redis:
#    docker-compose up -d redis
#
# 4. Chạy riêng RabbitMQ:
#    docker-compose up -d rabbitmq
#
# 5. Dừng tất cả các container:
#    docker-compose down
#
# 6. Dừng riêng một container (ví dụ MySQL):
#    docker-compose stop mysql
#
# 7. Xem log của container:
#    docker-compose logs -f [service_name]
#    Ví dụ: docker-compose logs -f mysql
#
# 8. Kiểm tra trạng thái các container:
#    docker-compose ps
#
# 9. Xóa container và volume:
#    docker-compose down -v
#
# 10. Truy cập RabbitMQ Management UI:
#     URL: http://localhost:15672
#     Username: guest
#     Password: guest
#

version: '3.8'

services:
  # Spring Boot API
  app:
    build: .
    container_name: ecommerce-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - ecommerce-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      timeout: 30s
      retries: 10


volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  uploads_data:

networks:
  ecommerce-network:
    driver: bridge
